version: "3.8"

x-agent-defaults: &agent-defaults
  build:
    context: .
    args:
      USER_ID: "1000"
      GROUP_ID: "1000"
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "python3 -c \"from gateway.run import GatewayRunner; print('OK')\""]
    interval: 60s
    timeout: 10s
    retries: 3
    start_period: 30s
  environment:
    - TZ=America/Chicago

services:
